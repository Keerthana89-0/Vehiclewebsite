<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shortlisted Cars</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
    }

    .car {
      background-color: white;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .car img {
      width: 200px;
      height: auto;
      border-radius: 8px;
      margin-right: 20px;
    }

    .car-details {
      flex: 1;
    }

    .car-details h3 {
      margin: 0;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-top: 8px;
    }

    .actions {
      margin-top: 15px;
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      margin-right: 10px;
      cursor: pointer;
    }

    .btn-details {
      background-color: #007bff;
      color: white;
    }

    .btn-remove {
      background-color: #dc3545;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>🚗 My Shortlisted Cars</h1>
</header>

<div class="container" id="shortlistContainer">
  <!-- Cars will be loaded here from localStorage -->
</div>
<div id="shortlistContainer"></div>

<script>
window.onload = function () {
  let shortlist = JSON.parse(localStorage.getItem("shortlist")) || [];
  let container = document.getElementById("shortlistContainer");

  if (shortlist.length === 0) {
    container.innerHTML = "<p>No cars in shortlist yet.</p>";
  } else {
    container.innerHTML = shortlist.map(car => `
      <div class="car">
        <h3>${car.name} (${car.model})</h3>
        <p><strong>Price:</strong> ${car.price}</p>
        <p><strong>Year:</strong> ${car.year}</p>
        <p><strong>Owner:</strong> ${car.owner.name}</p>
        <p><strong>Email:</strong> ${car.owner.email}</p>
        <p><strong>Phone:</strong> ${car.owner.phone}</p>
        <button onclick="removeCar(this)">Remove</button>
      </div>
    `).join("");
  }
};

function removeCar(button) {
  const carElement = button.closest('.car');
  carElement.remove();
}
</script>


<script>
  function removeCar(carName) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart = cart.filter(item => item !== carName);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderShortlist();
  }

  function renderShortlist() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let container = document.getElementById("shortlistContainer");

    if (cart.length === 0) {
      container.innerHTML = "<p>No cars in shortlist yet.</p>";
    } else {
      container.innerHTML = cart.map(car => `
        <div class="car">
          <img src="https://tse4.mm.bing.net/th/id/OIP.dlYjSadO2uUG-OEF7lz7YAHaD4?pid=Api&P=0&h=180${car}" alt="${car}">
          <div class="car-details">
            <h3>${car}</h3>
            <p>Details not available (static example)</p>
            <div class="price">--</div>
            <div class="actions">
              <button class="btn btn-details">View Details</button>
              <button class="btn btn-remove" onclick="removeCar('${car}')">Remove</button>
            </div>
          </div>
        </div>
      `).join("");
    }
  }
  

  window.onload = renderShortlist;
</script>

</body>
</html>
